<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WordVault</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FFF176">
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

  <div class="auth-brand">
    <span class="material-symbols-outlined icon-filled" style="color:#7A6500">book_2</span>
    WordVault
  </div>
  <p class="auth-subtitle">Save words as you browse</p>

  <div class="auth-tabs" id="auth-tabs">
    <button class="tab-btn active" id="signin-tab">Sign In</button>
    <button class="tab-btn" id="signup-tab">Sign Up</button>
  </div>

  <div class="auth-form" id="signin-form">
    <button class="btn btn-outline" id="google-signin-btn" style="margin-bottom: 8px; font-weight: 500;">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style="width: 18px; height: 18px;">
      Continue with Google
    </button>
    <div style="text-align: center; font-size: 12px; color: var(--text-secondary); margin: 4px 0;">or</div>
    <input class="input" type="email" id="signin-email" placeholder="Email" />
    <input class="input" type="password" id="signin-password" placeholder="Password" />
    <button class="btn btn-accent" id="sign-in-btn">Sign In</button>
  </div>

  <div class="auth-form hidden" id="signup-form">
    <button class="btn btn-outline" id="google-signup-btn" style="margin-bottom: 8px; font-weight: 500;">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style="width: 18px; height: 18px;">
      Continue with Google
    </button>
    <div style="text-align: center; font-size: 12px; color: var(--text-secondary); margin: 4px 0;">or</div>
    <input class="input" type="text" id="signup-firstname" placeholder="First Name" />
    <input class="input" type="text" id="signup-lastname" placeholder="Last Name" />
    <input class="input" type="text" id="signup-username" placeholder="Username" />
    <input class="input" type="email" id="signup-email" placeholder="Email" />
    <input class="input" type="password" id="signup-password" placeholder="Password" />
    <button class="btn btn-accent" id="sign-up-btn">Sign Up</button>
  </div>

  <div class="auth-feedback hidden" id="auth-feedback"></div>

  <script src="config.js"></script>
  <script src="shared.js"></script>
  <script async crossorigin="anonymous" src="https://current-whippet-53.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"></script>
  <script src="popup.js"></script>
</body>
</html>
