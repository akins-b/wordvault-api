<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WordVault - Settings</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FFF176">
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <header class="top-bar">
    <div class="top-bar-brand">
      <span class="material-symbols-outlined icon-filled" style="color:#7A6500">book_2</span>
      WordVault
    </div>
    <button class="icon-btn" id="logout-btn">
      <span class="material-symbols-outlined">logout</span>
    </button>
  </header>

  <main class="main-content" style="margin-top:64px">

    <section style="margin-bottom:24px">
      <div style="font-size:16px;font-weight:600;margin-bottom:12px">Account</div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;display:flex;align-items:center;gap:12px">
        <div style="width:44px;height:44px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--accent-text);flex-shrink:0" id="avatar">—</div>
        <div style="overflow:hidden">
          <div style="font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="settings-name">—</div>
          <div style="font-size:12px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="settings-email">—</div>
        </div>
      </div>
    </section>

    <section style="margin-bottom:24px">
      <div style="font-size:16px;font-weight:600;margin-bottom:12px">Notifications</div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid var(--border)">
          <div>
            <div style="font-weight:500;font-size:14px">Weekly Summary</div>
            <div style="font-size:12px;color:var(--text-secondary)">Email every Sunday evening</div>
          </div>
          <label class="toggle-wrap">
            <input type="checkbox" class="toggle-input" id="weekly-toggle" checked />
            <div class="toggle-slot">
              <div class="toggle-dot"></div>
            </div>
          </label>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:16px">
          <div>
            <div style="font-weight:500;font-size:14px">Push Notifications</div>
            <div style="font-size:12px;color:var(--text-secondary)">Weekly word summary</div>
          </div>
          <label class="toggle-wrap">
            <input type="checkbox" class="toggle-input" id="push-toggle" />
            <div class="toggle-slot">
              <div class="toggle-dot"></div>
            </div>
          </label>
        </div>
      </div>
    </section>

    <section style="margin-bottom:24px">
      <div style="font-size:16px;font-weight:600;margin-bottom:12px">About</div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden">
        <div style="display:flex;justify-content:space-between;padding:16px;border-bottom:1px solid var(--border)">
          <span style="font-size:14px">Version</span>
          <span style="font-size:14px;color:var(--text-secondary)">1.0.0</span>
        </div>
        <div style="display:flex;justify-content:space-between;padding:16px">
          <span style="font-size:14px">Built with</span>
          <span style="font-size:14px;color:var(--text-secondary)">❤️ &amp; coffee</span>
        </div>
      </div>
    </section>

    <button class="btn btn-outline" id="signout-btn" style="color:#991B1B;border-color:#FECACA">
      Sign Out
    </button>

  </main>

  <nav class="bottom-nav">
    <button class="nav-item" id="nav-home">
      <span class="material-symbols-outlined">home</span>
      <span>Home</span>
    </button>
    <button class="nav-item" id="nav-vault">
      <span class="material-symbols-outlined">account_balance_wallet</span>
      <span>Vault</span>
    </button>
    <button class="nav-item active" id="nav-settings">
      <span class="material-symbols-outlined icon-filled">settings</span>
      <span>Settings</span>
    </button>
  </nav>

  <script src="config.js"></script>
  <script src="shared.js"></script>
  <script src="settings.js"></script>
</body>
</html>
