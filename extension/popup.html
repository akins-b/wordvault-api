<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WordVault</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

  <div class="auth-brand">
    <img src="icons/word-vault-icon.jpg" alt="WordVault Icon" style="width: 28px; height: 28px; border-radius: 6px;">
    WordVault
  </div>
  <p class="auth-subtitle">Save words as you browse</p>

  <div class="auth-tabs" id="auth-tabs">
    <button class="tab-btn active" id="signin-tab">Sign In</button>
    <button class="tab-btn" id="signup-tab">Sign Up</button>
  </div>


  <div class="auth-form" id="signin-form">

    <input class="input" type="email" id="signin-email" placeholder="Email" />
    <input class="input" type="password" id="signin-password" placeholder="Password" />
    <button class="btn btn-accent" id="sign-in-btn">Sign In</button>
  </div>


  <div class="auth-form hidden" id="signup-form">

    <input class="input" type="text" id="signup-firstname" placeholder="First Name" />
    <input class="input" type="text" id="signup-lastname" placeholder="Last Name" />
    <input class="input" type="text" id="signup-username" placeholder="Username" />
    <input class="input" type="email" id="signup-email" placeholder="Email" />
    <input class="input" type="password" id="signup-password" placeholder="Password" />
    <button class="btn btn-accent" id="sign-up-btn">Sign Up</button>
  </div>

  <div class="auth-feedback hidden" id="auth-feedback"></div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
